{# ── dump hours (computed client-side so stale builds stay accurate) ──── #}
<div x-data="dumpHours()"
     :class="open ? 'border-green-200 bg-green-50' : 'border-gray-200 bg-white'"
     class="rounded-xl border px-4 py-3 flex items-center justify-between gap-4">
  <div class="flex items-center gap-2.5">
    <svg xmlns="http://www.w3.org/2000/svg"
         :class="open ? 'text-green-600' : 'text-gray-400'"
         class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
    </svg>
    <div>
      <p class="text-sm font-semibold text-gray-900 leading-tight">
        <a href="https://www.spearfish.gov/425/Restricted-Use-Site" target="_blank" rel="noopener noreferrer" class="hover:underline">Spearfish Dump</a>
      </p>
      <p class="text-xs text-gray-500 leading-snug" x-text="season + ' schedule · ' + schedule"></p>
    </div>
  </div>
  <div class="text-right shrink-0">
    <template x-if="open">
      <div>
        <p class="text-sm font-bold text-green-700">Open today</p>
        <p class="text-xs text-green-600" x-text="hours"></p>
      </div>
    </template>
    <template x-if="!open">
      <p class="text-sm font-semibold text-gray-500" x-text="reason"></p>
    </template>
  </div>
</div>

<script>
// Spearfish Restricted Use Site hours, computed at page-load time in Mountain Time.
// Summer (Apr 15–Oct 14): Mon–Sat 7:30 AM–4 PM
// Winter (Oct 15–Apr 14): Mon–Fri 7:30 AM–4 PM, Sat 9 AM–2 PM
// Closed Sundays always. Closed federal/state holidays.
function dumpHours() {
  // Decompose today in Mountain Time
  const parts = Object.fromEntries(
    new Intl.DateTimeFormat('en-US', {
      timeZone: 'America/Denver',
      year: 'numeric', month: 'numeric', day: 'numeric', weekday: 'long',
    }).formatToParts(new Date()).map(p => [p.type, p.value])
  );
  const year = +parts.year, month = +parts.month, day = +parts.day;
  const weekday = parts.weekday; // e.g. 'Monday'

  // nth weekday of month: wd 0=Sun…6=Sat, n 1-based or -1 for last
  function nth(y, m, wd, n) {
    const first = new Date(y, m - 1, 1).getDay();
    let d = 1 + (wd - first + 7) % 7;
    if (n > 0) d += (n - 1) * 7;
    else { while (d + 7 <= new Date(y, m, 0).getDate()) d += 7; }
    return d;
  }

  const tg = nth(year, 11, 4, 4); // Thanksgiving: 4th Thursday of November
  const holidays = [
    [1,  1,                        "New Year's Day"],
    [1,  nth(year, 1, 1, 3),       "MLK Jr. Day"],
    [2,  nth(year, 2, 1, 3),       "Presidents' Day"],
    [5,  nth(year, 5, 1, -1),      "Memorial Day"],
    [6,  19,                       "Juneteenth"],
    [7,  4,                        "Independence Day"],
    [9,  nth(year, 9, 1, 1),       "Labor Day"],
    [10, nth(year, 10, 1, 2),      "Native American Day"],
    [11, 11,                       "Veterans Day"],
    [11, tg,                       "Thanksgiving"],
    [11, tg + 1,                   "Thanksgiving Friday"],
    [12, 25,                       "Christmas Day"],
  ];
  const holiday = holidays.find(([hm, hd]) => hm === month && hd === day);

  const isSummer = (month > 4 || (month === 4 && day >= 15)) &&
                   (month < 10 || (month === 10 && day < 15));
  const summerSched = 'Mon–Sat 7:30 AM–4 PM';
  const winterSched = 'Mon–Fri 7:30 AM–4 PM · Sat 9 AM–2 PM';
  const schedule = isSummer ? summerSched : winterSched;
  const season   = isSummer ? 'Summer' : 'Winter';

  if (holiday) return { open: false, hours: '', reason: `Closed — ${holiday[2]}`, schedule, season };
  if (weekday === 'Sunday') return { open: false, hours: '', reason: 'Closed — Sunday', schedule, season };

  const hours = (!isSummer && weekday === 'Saturday') ? '9 AM – 2 PM' : '7:30 AM – 4 PM';
  return { open: true, hours, reason: '', schedule, season };
}
</script>
