name: Daily Scrape and Build

on:
  push:
    branches: ["main"]
  schedule:
    # 10 am MT
    - cron: '0 17 * * *'
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: sudo apt-get install -y poppler-utils

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run playwright install chromium

      - name: Run scrapers
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: uv run python -m scrapers

      - name: Commit updated data
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/*.json
          git diff --staged --quiet || git commit -m "chore: update scraped data [skip ci]" && git push

      - name: Fetch eBird sightings
        env:
          EBIRD_API_KEY: ${{ secrets.EBIRD_API_KEY }}
        run: |
          uv run python -c "
          from scrapers.sources.ebird import fetch_ebird
          fetch_ebird()
          "

      - name: Fetch library circulation data
        run: |
          uv run python -c "
          from scrapers.sources.library_circulation import fetch_circulation
          fetch_circulation()
          "

      - name: Fetch creek gauge data
        run: |
          uv run python -c "
          from scrapers.sources.creek_gauge import CreekGaugeScraper
          CreekGaugeScraper().run()
          "

      - name: Build site
        run: uv run python build.py

      - name: Generate calendar and RSS feeds
        run: uv run python calendar_feed.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
